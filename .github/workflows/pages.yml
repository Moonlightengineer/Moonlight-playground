name: Verify and deploy playground

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test v2 foundations
        run: >-
          node --test
          games/hanzi-generals/v2/tests/data-validator.test.js
          games/hanzi-generals/v2/tests/rng.test.js
          games/hanzi-generals/v2/tests/storage.test.js
          games/hanzi-generals/v2/tests/board.test.js
          games/hanzi-generals/v2/tests/deck.test.js
          games/hanzi-generals/v2/tests/assembly.test.js

      - name: Test v2 combat rules
        run: >-
          node --test
          games/hanzi-generals/v2/tests/combat-engine.test.js
          games/hanzi-generals/v2/tests/enemy-intents.test.js
          games/hanzi-generals/v2/tests/orders.test.js

      - name: Test v2 expedition flow
        run: >-
          node --test
          games/hanzi-generals/v2/tests/expedition.test.js
          games/hanzi-generals/v2/tests/state-machine.test.js

      - name: Test v2 UI contracts
        run: node --test games/hanzi-generals/v2/tests/ui-contract.test.js

      - name: Run complete JavaScript suite
        run: npm test

      - name: Run build regression tests
        run: python -m unittest tests/test_build_site.py -v

      - name: Build and verify static site
        run: python scripts/build_site.py

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
          include-hidden-files: true

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
